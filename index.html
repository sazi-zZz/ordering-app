<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Asthetics Shop</title>
</head>

<body>
    <div id="app-container">
        <header>
            <h1>Asthetics Shop</h1>
            <p>buy the coolest aesthetics and farm vibes!</p>
        </header>

        <div id="inside">
            <div id="item-container">
                <div class="item">
                    <div class="item-info">
                        <div class="item-image">
                            <img src="img/aestheticHome.jpeg" alt="aestheticHome">
                        </div>
                        <div class="item-desc">
                            <h2>Home</h2>
                            <p>cool, sleek, calm</p>
                            <h3>$1000</h3>
                        </div>
                    </div>
                    <div class="add-item-btn">
                        <button>+</button>
                    </div>
                </div>
            </div>

            <div id="order-container">
                <div id="order-heading">
                    <h2>Your Order</h2>
                </div>
                <div id="order-list">
                    <div class="order-item">
                        <div class="order-item-name">
                            <strong>Home</strong>
                        </div>
                        <div class="order-item-price">
                            $1000
                        </div>
                    </div>
                </div>

                <hr id="order-list-end-divider">

                <div id="total-order">
                    <div id="total-heading">
                        <strong>Total: </strong>
                    </div>

                    <div id="total-price">
                        <strong>$1000</strong>
                    </div>
                </div>

                <div id="place-order-btn">
                    <button>Pay & Place Order</button>
                </div>

                <div id="success-message">
                    <h3>
                        Your Order is Comming!!
                    </h3>
                </div>
            </div>
        </div>
    </div>

    <!-- card details modal to pay  -->
    <div id="card-details">
        <div id="card-details-heading">
            <h2>Enter Card Details</h2>
        </div>
        <form action="#">
            <input type="text" name="cardHolder" id="cardHolder" placeholder="Card Holder's Name...">
            <input type="text" name="cardNumber" id="cardNumber" placeholder="Car Number...">
            <input type="text" name="cvc" id="cvc" placeholder="CVC...">
            <button type="submit">Pay $1000</button>
            <button type="button">Cancel</button>
        </form>

        <h4 id="payment-ongoing">
            Payment of $1000 is in Progress...
        </h4>

        <h4 id="payment-done">
            Payment of $1000 is Completed!
        </h4>
    </div>
    <script type="module" src="script.js"></script>
</body>

</html>
